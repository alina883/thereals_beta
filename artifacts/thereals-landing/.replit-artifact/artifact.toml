kind = "web"
previewPath = "/"
title = "The Reals — Landing Page"
version = "1.0.0"
id = "artifacts/thereals-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23932

[services.development]
run = "pnpm --filter @workspace/thereals-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thereals-landing", "run", "build" ]
publicDir = "artifacts/thereals-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23932"
BASE_PATH = "/"
